name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets and sponsor logos into HTML files
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: |
          python3 << 'PY'
          import os
          from urllib.parse import quote

          sheet_url = os.environ['SHEET_URL']
          for fname in ['register.html', 'preorder.html']:
              with open(fname, 'r') as f:
                  content = f.read()
              content = content.replace('__SHEET_URL__', sheet_url)
              with open(fname, 'w') as f:
                  f.write(content)

          logo_dir = 'sponsor-logos'
          exts = ('.png', '.jpg', '.jpeg', '.svg', '.webp', '.gif')
          files = sorted(
              f for f in os.listdir(logo_dir)
              if f.lower().endswith(exts) and not f.startswith('.')
          )
          tags = [
              f'<img src="{logo_dir}/{quote(f)}" alt="{os.path.splitext(f)[0]}" class="sponsor-logo" loading="lazy">'
              for f in files
          ]
          placeholder = '<!-- SPONSOR_LOGOS: injected at deploy time from sponsor-logos/ by .github/workflows/deploy.yml -->'
          with open('index.html', 'r') as f:
              content = f.read()
          if placeholder not in content:
              raise SystemExit('sponsor logo placeholder missing from index.html')
          content = content.replace(placeholder, '\n        '.join(tags))
          with open('index.html', 'w') as f:
              f.write(content)
          PY

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
