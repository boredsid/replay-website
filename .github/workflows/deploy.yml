name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into register.html
        run: |
          sed -i "s|__GUILD_CSV_URL__|${{ secrets.GUILD_CSV_URL }}|g" register.html
          sed -i "s|__REG_CSV_URL__|${{ secrets.REG_CSV_URL }}|g" register.html
          sed -i "s|__SHEET_URL__|${{ secrets.SHEET_URL }}|g" register.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
